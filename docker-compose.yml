services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
    volumes:
      - db_data:/var/lib/mysql # This persists the database files

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    restart: always
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./local-llm:/var/www/html/wp-content/plugins/local-llm
      # This persists the WordPress installation so you don't have to re-run setup
      - ./wp-data:/var/www/html 

volumes:
  db_data: # Define the volume here
